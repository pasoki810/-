let characters = [];
let selectedBase = 0;

// K/M対応
function parseValue(v){
  if(v.includes("K")) return parseFloat(v)*1000;
  if(v.includes("M")) return parseFloat(v)*1000000;
  return parseFloat(v);
}

// 読み込み
function loadData() {
  characters = [];
  const rarityList = ["Common","Rare","Epic","Legendary","Mythic","Brainrot God","Secret","Goat"];

  // データを空白で分割
  let tokens = data.trim().split(/\s+/);
  let currentRarity = "Common";
  let i = 0;

  while(i < tokens.length){
    // レアリティチェック（Brainrot Godは2単語）
    if(tokens[i] === "Brainrot" && tokens[i+1] === "God"){
      currentRarity = "Brainrot God";
      i += 2;
      continue;
    } else if(rarityList.includes(tokens[i])){
      currentRarity = tokens[i];
      i++;
      continue;
    }

    // 値を探す（数字かK/M付き）
    let valueIndex = i + 1;
    while(valueIndex < tokens.length && isNaN(parseFloat(tokens[valueIndex])) && !tokens[valueIndex].includes("K") && !tokens[valueIndex].includes("M")){
      valueIndex++;
    }

    // 名前はi〜valueIndex-1まで
    let name = tokens.slice(i, valueIndex).join(" ");
    let value = parseValue(tokens[valueIndex]);

    characters.push({name, base: value, rarity: currentRarity});

    i = valueIndex + 1;
  }

  filterCharacters();
}




// フィルター
function filterCharacters(){
  let rarity = document.getElementById("raritySelect").value;
  let select = document.getElementById("characterSelect");

  select.innerHTML = '<option value="">キャラ選択</option>';

  characters.forEach(c=>{
    if(rarity === "all" || c.rarity === rarity){
      let op = document.createElement("option");
      op.value = c.name;
      op.textContent = c.name;
      select.appendChild(op);
    }
  });
}

// 選択
function setCharacter(){
  let name = document.getElementById("characterSelect").value;
  let c = characters.find(x=>x.name===name);
  if(!c) return;

  selectedBase = c.base;
}

// 表示
function format(v){
  if(v>=1e6) return (v/1e6).toFixed(1)+"M/s";
  if(v>=1e3) return (v/1e3).toFixed(1)+"K/s";
  return v.toFixed(1)+"/s";
}

// 計算
function calculate(){
  let m = 0;

  document.querySelectorAll("input[type=checkbox]:checked")
    .forEach(x=>m+=parseFloat(x.value));

  let attr = parseFloat(document.getElementById("attributeSelect").value);

  let result = selectedBase * (1 + m) * attr;

  document.getElementById("result").textContent = "最終値: " + format(result);
}

loadData();
filterCharacters();
</script>
