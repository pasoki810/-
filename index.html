<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>火力計算機</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
  margin-top: 40px;
}

select, button {
  padding: 10px;
  margin: 10px;
  font-size: 16px;
}

.result {
  font-size: 28px;
  color: cyan;
}

.mutations {
  display: inline-block;
  text-align: left;
  margin-top: 20px;
}

.mutations label {
  display: block;
  margin: 5px;
}
</style>
</head>

<body>

<h1>火力計算機</h1>

<select id="characterSelect" onchange="setCharacter()">
  <option value="">キャラ選択</option>
</select>

<h3>変異</h3>
<div class="mutations">
  <label><input type="checkbox" value="1.5"> 雷</label>
  <label><input type="checkbox" value="2"> 氷</label>
  <label><input type="checkbox" value="2.5"> ニューイヤー</label>
  <label><input type="checkbox" value="3"> グリッチ</label>
  <label><input type="checkbox" value="3.5"> ウェーブ</label>
  <label><input type="checkbox" value="2.5"> キューピット</label>
  <label><input type="checkbox" value="4"> パンプキン</label>
  <label><input type="checkbox" value="5"> スキビティ</label>
</div>

<br>
<button onclick="calculate()">計算</button>

<div class="result" id="result"></div>

<script>

// ★そのまま貼ったデータOK
const data = `
Fishini Bossini		1
Lirili Larilla		3
Tim Cheese		5
Fluriflura		7
Penguino Cocosino		9
Svinina Bombardino		10
Pipi Kiwi		13
Pipi Avocado		14
Trippi Troppi		15
Tung Tung Tung Sahur		25
Gangster Footera		30
Boneca Ambalabu		40
Pipi Corni		50
Ta Ta Ta Ta Sahur		55
Burballoni Watermeloni		60
Pipi Potato		70
Cappuccino Assassino		75
Brr Brr Patapim		100
Trulimero Trulicina		120
Bananita Dolphinita		150
Los Lirilitos		200
Salamino Pinguino		250
Tric Trac Baraboom		275
Los Tung TungCitos		300
Tukanno Bananno		325
Blueberrinni Octopussini		350
Spijuniro Golubiro		400
Penguini Zucchini		425
Blueberrini Tatticini		450
Gingobalo Gingobali		500
Skibidi Toilet		350M
`;

// ------------------

let characters = [];
let selectedBase = 0;

// K / M対応
function parseValue(v){
  v = v.trim();
  if(v.includes("K")) return parseFloat(v)*1000;
  if(v.includes("M")) return parseFloat(v)*1000000;
  return parseFloat(v);
}

// データ読み込み
function load(){
  const lines = data.split("\n");

  lines.forEach(line=>{
    line = line.trim();
    if(!line) return;

    let parts = line.split("\t").filter(x=>x);

    let value = parseValue(parts.pop());
    let name = parts.join(" ");

    characters.push({name, base:value});
  });

  render();
}

// セレクト生成
function render(){
  const select = document.getElementById("characterSelect");

  characters.forEach(c=>{
    let op = document.createElement("option");
    op.value = c.name;
    op.textContent = c.name;
    select.appendChild(op);
  });
}

// 選択時
function setCharacter(){
  let name = characterSelect.value;
  let c = characters.find(x=>x.name===name);
  if(!c) return;

  selectedBase = c.base;
}

// 表示用
function format(v){
  if(v>=1e6) return (v/1e6).toFixed(1)+"M/s";
  if(v>=1e3) return (v/1e3).toFixed(1)+"K/s";
  return v.toFixed(1)+"/s";
}

// 計算
function calculate(){
  let m = 0;

  document.querySelectorAll("input[type=checkbox]:checked")
    .forEach(x=>m+=parseFloat(x.value));

  let result = selectedBase * (1 + m);

  document.getElementById("result").textContent =
    "最終値: " + format(result);
}

// 初期化
load();

</script>

</body>
</html>
