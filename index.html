<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>火力計算機</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
  margin-top: 40px;
}

select, button {
  padding: 10px;
  margin: 10px;
  font-size: 16px;
}

.result {
  font-size: 28px;
  color: cyan;
}

.mutations {
  display: inline-block;
  text-align: left;
}

.mutations label {
  display: block;
}
</style>
</head>

<body>

<h1>火力計算機</h1>

<!-- レアリティ選択 -->
<select id="raritySelect" onchange="filterCharacters()">
  <option value="all">全て</option>
  <option value="Common">Common</option>
  <option value="Rare">Rare</option>
  <option value="Epic">Epic</option>
  <option value="Legendary">Legendary</option>
  <option value="Mythic">Mythic</option>
  <option value="Brainrot">Brainrot</option>
  <option value="Secret">Secret</option>
  <option value="Goat">Goat</option>
</select>

<br>

<!-- キャラ -->
<select id="characterSelect" onchange="setCharacter()">
  <option value="">キャラ選択</option>
</select>

<h3>変異</h3>
<div class="mutations">
  <label><input type="checkbox" value="1.5"> 雷</label>
  <label><input type="checkbox" value="2"> 氷</label>
  <label><input type="checkbox" value="2.5"> ニューイヤー</label>
  <label><input type="checkbox" value="3"> グリッチ</label>
  <label><input type="checkbox" value="3.5"> ウェーブ</label>
  <label><input type="checkbox" value="2.5"> キューピット</label>
  <label><input type="checkbox" value="4"> パンプキン</label>
  <label><input type="checkbox" value="5"> スキビティ</label>
</div>

<br>
<button onclick="calculate()">計算</button>

<div class="result" id="result"></div>

<script>

// ★レアリティ付きデータ
const data = `
Common	Fishini Bossini	1
Common	Lirili Larilla	3
Common	Tim Cheese	5
Rare	Trippi Troppi	15
Rare	Tung Tung Tung Sahur	25
Epic	Cappuccino Assassino	75
Legendary	Ballerina Cappuccina	500
Mythic	Sigma Boy	7K
Brainrot	Cocofanto Elefanto	10K
Secret	Los Tralaleritos	200K
Goat	Skibidi Toilet	350M
`;

let characters = [];
let selectedBase = 0;

// K/M対応
function parseValue(v){
  if(v.includes("K")) return parseFloat(v)*1000;
  if(v.includes("M")) return parseFloat(v)*1000000;
  return parseFloat(v);
}

// 読み込み
function load(){
  data.split("\n").forEach(line=>{
    line = line.trim();
    if(!line) return;

    let parts = line.split("\t");

    characters.push({
      rarity: parts[0],
      name: parts[1],
      base: parseValue(parts[2])
    });
  });

  filterCharacters();
}

// フィルター
function filterCharacters(){
  let rarity = raritySelect.value;
  let select = document.getElementById("characterSelect");

  select.innerHTML = '<option value="">キャラ選択</option>';

  characters.forEach(c=>{
    if(rarity === "all" || c.rarity === rarity){
      let op = document.createElement("option");
      op.value = c.name;
      op.textContent = c.name;
      select.appendChild(op);
    }
  });
}

// 選択
function setCharacter(){
  let name = characterSelect.value;
  let c = characters.find(x=>x.name===name);
  if(!c) return;

  selectedBase = c.base;
}

// 表示
function format(v){
  if(v>=1e6) return (v/1e6).toFixed(1)+"M/s";
  if(v>=1e3) return (v/1e3).toFixed(1)+"K/s";
  return v.toFixed(1)+"/s";
}

// 計算
function calculate(){
  let m = 0;

  document.querySelectorAll("input[type=checkbox]:checked")
    .forEach(x=>m+=parseFloat(x.value));

  let result = selectedBase * (1 + m);

  resultDiv.textContent = "最終値: " + format(result);
}

load();

</script>

</body>
</html>
