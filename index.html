// レア生成
const raritySelect = document.getElementById("rarity");
Object.entries(rarityMap).forEach(([k,v])=>{
  let op = document.createElement("option");
  op.value = v;
  op.textContent = k;
  raritySelect.appendChild(op);
});

// キャラ表示
function renderCharacters(list){
  const select = document.getElementById("characterSelect");
  select.innerHTML = '<option value="">キャラ選択</option>';

  list.forEach(c=>{
    let op = document.createElement("option");
    op.value = c.name;
    op.textContent = c.name;
    select.appendChild(op);
  });
}

// 検索
function filterCharacters(){
  let word = document.getElementById("search").value.toLowerCase();

  let filtered = characters.filter(c =>
    c.name.toLowerCase().includes(word)
  );

  renderCharacters(filtered);
}

// 選択 → 元値保存
function setCharacter(){
  let name = document.getElementById("characterSelect").value;

  let c = characters.find(x => x.name === name);
  if(!c) return;

  currentBase = c.base;
  document.getElementById("rarity").value = rarityMap[c.rarity];
}

// 表示
function format(v){
  if(v>=1e9) return (Math.floor(v/1e8)/10)+"B/s";
  if(v>=1e6) return (Math.floor(v/1e5)/10)+"M/s";
  if(v>=1e3) return (Math.floor(v/100)/10)+"K/s";
  return v.toFixed(1)+"/s";
}

// 計算
function calculate(){
  let r = parseFloat(rarity.value);
  let m = 0;

  document.querySelectorAll("input[type=checkbox]:checked")
    .forEach(x=>m+=parseFloat(x.value));

  let result = currentBase * (r + m);

  document.getElementById("result").textContent =
    "最終値: " + format(result);
}
