<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>火力計算機</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
  margin-top: 40px;
}

select, button {
  padding: 10px;
  margin: 10px;
}

/* チェックボックス揃え */
.mutation {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  width: 200px;
  margin: 0 auto;
}

.mutation label {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 5px 0;
}

.result {
  font-size: 28px;
  color: cyan;
}
</style>
</head>

<body>

<h1>火力計算機</h1>

<!-- レアリティ先 -->
<select id="rarity"></select>

<!-- キャラ -->
<select id="characterSelect">
  <option>キャラ選択</option>
</select>

<br><br>

<h3>変異</h3>

<div class="mutation">
  <label><input type="checkbox" value="1.5"> 雷</label>
  <label><input type="checkbox" value="2"> 氷</label>
  <label><input type="checkbox" value="2.5"> ニューイヤー</label>
  <label><input type="checkbox" value="3"> グリッチ</label>
  <label><input type="checkbox" value="3.5"> ウェーブ</label>
  <label><input type="checkbox" value="4"> キューピット</label>
  <label><input type="checkbox" value="4.5"> パンプキン</label>
  <label><input type="checkbox" value="5"> スキビティ</label>
</div>

<br>
<button onclick="calculate()">計算</button>

<div class="result" id="result"></div>

<script>

const rarityMap = {
  "Common":1,
  "Rare":2,
  "Epic":3,
  "Legendary":4,
  "Mythic":5,
  "Brainrot God":6,
  "Secret":7,
  "Goat":8
};

let characters = [];

const data = `
Common Fishini Bossini 1
Lirili Larilla 3

Svinina Bombardino 10

Boneca Ambalabu 40
Pipi Corni 50
Ta Ta Ta Ta Sahur 55

Pipi Potato 70

Brr Brr Patapim 100

Los Lirilitos 200

Los Tung TungCitos 300
Tukanno Bananno 325
Blueberrinni Octopussini 350
Spijuniro Golubiro 400
Penguini Zucchini 425
Blueberrini Tatticini 450
Gingobalo Gingobali 500
Legendary Burbalona Loliloli 200
Chimpanzini Bananini 300
Ballerina Cappuccina 500
Chef Crabracadabra 600
Glorbo Fruttodillo 750
Cacto Hipopotamo 900
Ballerino Lololo 1000
Lerulerulerule 1200
Bambini Crostini 1500
Francescoo 1700
Zibra Zubra Zibralini 2000
Bambu di Miale 2200
Mangolini Parrocini 2500
Lampu Lampu Sahur 2600
Octopuss Coconuss 2700
Leonelli Cactuselli 3000

Bombombini Gusini 5000

To To To Sahur 13000
Elefante Cafettino 13500

Tang Tang Kelentang 17000

Patapimus Maximus 19000

Santoniooo 21000

Los Sigma Boys 23000
Ti Ti Ti Sahur 25000

Trenostruzzo Turbo 3000 300000

Los Couples 450000
Las Agarrinis 470000

Los Job Jobsitos 700000
Anpali Babel 800000

Orcalero Orcala 1000000
Frogino Assassino 1200000
Goat Skibidi Toilet 350000000
`;

function loadData(){
  const lines = data.split("\n");
  let currentRarity = "";

  lines.forEach(line=>{
    line = line.trim();
    if(!line) return;

    let parts = line.split(" ");
    let value = parseFloat(parts.pop());

    if(rarityMap[parts[0]]){
      currentRarity = parts.shift();
    }

    let name = parts.join(" ");

    characters.push({
      name,
      base:value,
      rarity:currentRarity
    });
  });

  renderRarity();
}

function renderRarity(){
  const r = document.getElementById("rarity");

  Object.keys(rarityMap).forEach(k=>{
    let op = document.createElement("option");
    op.value = k;
    op.textContent = k;
    r.appendChild(op);
  });

  filterCharacters();
}

function filterCharacters(){
  const r = document.getElementById("rarity").value;
  const select = document.getElementById("characterSelect");

  select.innerHTML = "<option>キャラ選択</option>";

  characters
    .filter(c=>c.rarity===r)
    .forEach(c=>{
      let op = document.createElement("option");
      op.value = c.name;
      op.textContent = c.name;
      select.appendChild(op);
    });
}

document.getElementById("rarity").onchange = filterCharacters;

function calculate(){
  const name = characterSelect.value;
  const c = characters.find(x=>x.name===name);
  if(!c) return;

  let base = c.base;
  let r = rarityMap[c.rarity];
  let m = 0;

  document.querySelectorAll("input[type=checkbox]:checked")
    .forEach(x=>m+=parseFloat(x.value));

  let result = base * (r + m);
  document.getElementById("result").textContent =
    "最終値: " + result.toLocaleString();
}

loadData();

</script>

</body>
</html>
