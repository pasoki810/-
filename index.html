let characters = [];
let selectedBase = 0;

// K/M/B対応
function parseValue(v){
  v = v.toUpperCase();
  if(v.endsWith("K")) return parseFloat(v)*1000;
  if(v.endsWith("M")) return parseFloat(v)*1000000;
  if(v.endsWith("B")) return parseFloat(v)*1000000000;
  return parseFloat(v);
}

// データ読み込み
function loadData(){
  characters = [];
  const lines = data.trim().split("\n");
  let currentRarity = "";
  lines.forEach(line => {
  line = line.replace(/\s+/g, '\t').trim(); // 空白をタブに統一
  if(!line) return;
  const parts = line.split('\t');
  if(parts.length < 2) return;

  let rarityNames = ["Common","Rare","Epic","Legendary","Mythic","Brainrot God","Secret","Goat"];

 if(rarityNames.includes(parts[0].trim())) {
    currentRarity = parts[0].trim();
    // parts[1] と parts[2] が存在すれば追加
    if(parts[1] && parts[2]) {
        const name = parts[1].trim();
        const value = parseValue(parts[2].trim());
        characters.push({name, base:value, rarity:currentRarity});
    }
}else {
    const name = parts[0].trim();
    const value = parseValue(parts[1].trim());
    characters.push({name, base:value, rarity:currentRarity});
  }
});

  filterCharacters();
}

// キャラフィルター
function filterCharacters(){
  const rarity=document.getElementById("raritySelect").value;
  const select=document.getElementById("characterSelect");
  select.innerHTML='<option value="">キャラ選択</option>';
  characters.forEach(c=>{
    if(rarity==="all" || c.rarity===rarity){
      const op=document.createElement("option");
      op.value=c.name;
      op.textContent=c.name;
      select.appendChild(op);
    }
  });
}

// 選択キャラ設定
function setCharacter(){
  const name=document.getElementById("characterSelect").value;
  const c=characters.find(x=>x.name===name);
  if(!c) return;
  selectedBase=c.base;
}

// 結果表示（B/M/K対応）
function format(v){
  if(v>=1e9) return Math.floor(v/1e9*10)/10 + "B";
  if(v>=1e6) return Math.floor(v/1e6*10)/10 + "M";
  if(v>=1e3) return Math.floor(v/1e3*10)/10 + "K";
  return Math.floor(v*10)/10;
}

// 計算
function calculate(){
  let mutationSum = 0;
  document.querySelectorAll("input[type=checkbox]:checked").forEach(x => {
    mutationSum += parseFloat(x.value);
  });
  
  const attr = parseFloat(document.getElementById("attributeSelect").value);
  
  // ★属性に+1して計算
  const totalMultiplier = (attr + 1) + mutationSum;
  
  const result = selectedBase * totalMultiplier;
  
  document.getElementById("result").textContent = "最終値: " + format(result);
}
